name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm --prefix web ci

      - name: Check Rust formatting
        run: cargo fmt --manifest-path Cargo.toml -- --check

      - name: Run backend tests
        run: cargo test --locked --manifest-path Cargo.toml

      - name: Run frontend tests
        run: npm --prefix web test

      - name: Build frontend
        run: npm --prefix web run build

  build:
    name: Build ${{ matrix.asset_name }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: linux-x86_64
            bin_path: target/x86_64-unknown-linux-gnu/release/claude-remote-web
            can_run: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: linux-aarch64
            bin_path: target/aarch64-unknown-linux-gnu/release/claude-remote-web
            can_run: false
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: macos-x86_64
            bin_path: target/x86_64-apple-darwin/release/claude-remote-web
            can_run: false
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: macos-aarch64
            bin_path: target/aarch64-apple-darwin/release/claude-remote-web
            can_run: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux arm64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install frontend dependencies
        run: npm --prefix web ci

      - name: Build frontend
        run: npm --prefix web run build

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --locked --manifest-path Cargo.toml --bin claude-remote-web --target ${{ matrix.target }}

      - name: Check runnable binary
        if: matrix.can_run == true
        run: ${{ matrix.bin_path }} --check

      - name: Package release asset
        id: package
        shell: bash
        run: |
          set -euo pipefail
          raw_version="${GITHUB_REF_NAME}"
          version="$(printf '%s' "${raw_version}" | LC_ALL=C tr -c 'A-Za-z0-9._-' '-')"
          package="claude-remote-web-${version}-${{ matrix.asset_name }}"
          archive_path="dist/${package}.tar.gz"
          mkdir -p "dist/${package}"
          cp "${{ matrix.bin_path }}" "dist/${package}/claude-remote-web"
          cp docs/release/README.release.md "dist/${package}/README.release.md"
          cp docs/release/config.example.toml "dist/${package}/config.example.toml"
          chmod +x "dist/${package}/claude-remote-web"
          tar -C dist -czf "${archive_path}" "${package}"
          tar -tzf "${archive_path}"
          printf 'package_name=%s\n' "${package}" >> "${GITHUB_OUTPUT}"
          printf 'archive_path=%s\n' "${archive_path}" >> "${GITHUB_OUTPUT}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.package_name }}
          path: ${{ steps.package.outputs.archive_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release-assets
          pattern: claude-remote-web-*
          merge-multiple: true

      - name: List release assets
        shell: bash
        run: |
          set -euo pipefail
          for asset in dist/release-assets/*.tar.gz; do
            test -f "${asset}"
            printf '%s\n' "${asset}"
          done

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release-assets/*.tar.gz
          generate_release_notes: true
          body: |
            macOS artifacts are not signed or notarized. On first launch, right-click Open in Finder or run:

            ```bash
            xattr -dr com.apple.quarantine claude-remote-web
            ```
